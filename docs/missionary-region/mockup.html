<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연계지 관리 — UI 목업 v1.9</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #111827;
      background: #F9FAFB;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 260px;
      height: 100vh;
      background: white;
      border-right: 1px solid #E5E7EB;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-logo {
      height: 64px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-logo-icon {
      width: 32px; height: 32px;
      background: #E60012;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .sidebar-logo-text { font-size: 15px; font-weight: 700; color: #111827; letter-spacing: -0.02em; }
    .sidebar-divider { height: 1px; background: #E5E7EB; margin: 0 16px; }
    .sidebar-nav {
      flex: 1; overflow-y: auto; padding: 16px 0;
      display: flex; flex-direction: column; gap: 2px;
    }
    .nav-item {
      position: relative;
      display: flex; align-items: center; gap: 12px;
      height: 44px; margin: 0 12px; padding: 0 12px;
      border-radius: 8px; font-size: 14px; font-weight: 500;
      color: #6B7280; cursor: pointer; transition: all 0.15s; text-decoration: none;
    }
    .nav-item:hover { background: #F9FAFB; color: #1F2937; }
    .nav-item.active { background: #F3F4F6; color: #111827; font-weight: 600; }
    .nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
      width: 3px; border-radius: 0 2px 2px 0; background: #E60012;
    }
    .sidebar-user {
      border-top: 1px solid #E5E7EB; padding: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: #1F2937; color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; flex-shrink: 0;
    }

    /* ─── LAYOUT ─── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .header {
      height: 64px; background: white; border-bottom: 1px solid #E5E7EB;
      padding: 0 32px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .header h1 { font-size: 20px; font-weight: 600; color: #111827; }
    .header-search { position: relative; width: 256px; }
    .header-search input {
      width: 100%; height: 40px; padding: 0 16px 0 40px;
      border-radius: 8px; background: #F9FAFB; border: 1px solid transparent;
      font-size: 14px; color: #111827; outline: none; transition: border-color 0.15s; font-family: inherit;
    }
    .header-search input:focus { border-color: #D1D5DB; }
    .header-search input::placeholder { color: #9CA3AF; }
    .header-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #9CA3AF; }

    .content {
      flex: 1; overflow-y: auto; padding: 28px 32px;
      display: flex; flex-direction: column; gap: 20px;
    }

    /* ─── PAGE HEADER ─── */
    .page-header { display: flex; align-items: center; justify-content: space-between; }
    .page-header h2 { font-size: 22px; font-weight: 700; color: #111827; }

    /* ─── BUTTONS ─── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; font-weight: 600; border-radius: 8px;
      cursor: pointer; transition: all 0.15s; border: none; font-family: inherit;
    }
    .btn-xs  { height: 28px; padding: 0 10px; font-size: 12px; border-radius: 6px; }
    .btn-sm  { height: 32px; padding: 0 12px; font-size: 13px; }
    .btn-md  { height: 40px; padding: 0 16px; font-size: 14px; }
    .btn-lg  { height: 48px; padding: 0 20px; font-size: 15px; }

    .btn-primary { background: #E60012; color: white; }
    .btn-primary:hover:not(:disabled) { background: #CC0010; }
    .btn-primary:disabled { background: #E5E7EB; color: #9CA3AF; cursor: not-allowed; }

    .btn-neutral { background: #1F2937; color: white; }
    .btn-neutral:hover:not(:disabled) { background: #374151; }

    .btn-outline { background: white; color: #1F2937; border: 1px solid #D1D5DB; }
    .btn-outline:hover:not(:disabled) { background: #F9FAFB; }
    .btn-outline:disabled { border-color: #E5E7EB; color: #D1D5DB; cursor: not-allowed; }

    .btn-outline-danger { background: white; color: #E60012; border: 1px solid #FECACA; }
    .btn-outline-danger:hover { background: #FFF5F5; }

    .btn-destructive { background: #E60012; color: white; }
    .btn-destructive:hover { background: #CC0010; }

    .btn-ghost { background: transparent; color: #6B7280; border: none; }
    .btn-ghost:hover { background: #F3F4F6; color: #1F2937; }

    /* ─── FILTER ROW v1.5: SearchBox 왼쪽 — 유저 관리 패턴 일치 ─── */
    .filter-row {
      display: flex; gap: 12px; align-items: flex-end;
    }
    .filter-group { display: flex; flex-direction: column; gap: 5px; }
    .filter-label { font-size: 12px; font-weight: 500; color: #374151; }
    .filter-search-group { display: flex; flex-direction: column; gap: 5px; flex: 1; max-width: 360px; }

    .select-trigger {
      display: flex; align-items: center; justify-content: space-between;
      height: 40px; padding: 0 12px; border: 1px solid #E5E7EB; border-radius: 8px;
      background: white; font-size: 14px; color: #111827;
      cursor: pointer; gap: 8px; min-width: 180px; transition: all 0.15s;
    }
    .select-trigger:hover { border-color: #D1D5DB; }
    .select-trigger.has-value { color: #111827; }
    .select-trigger.disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

    /* ─── SEARCH BOX IN FILTER ROW ─── */
    .filter-search { position: relative; flex: 1; min-width: 240px; }
    .filter-search input {
      width: 100%; height: 40px; padding: 0 12px 0 38px;
      border: 1px solid #E5E7EB; border-radius: 8px; background: white;
      font-size: 14px; color: #111827; outline: none; transition: all 0.15s; font-family: inherit;
    }
    .filter-search input:focus { border-color: #9CA3AF; box-shadow: 0 0 0 1px #9CA3AF; }
    .filter-search input::placeholder { color: #9CA3AF; }
    .filter-search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #9CA3AF; pointer-events: none; }
    .filter-search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px; border-radius: 50%; background: #9CA3AF;
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* ─── CARD ─── */
    .card { background: white; border-radius: 12px; border: 1px solid #E5E7EB; overflow: hidden; }
    .card-header {
      padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #F3F4F6;
    }
    .card-title { font-size: 15px; font-weight: 600; color: #111827; display: flex; align-items: center; gap: 8px; }
    .count-badge {
      background: #F3F4F6; color: #6B7280;
      font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
    }

    /* ─── TABLE v1.7: 선교 그룹 | 차수 | 연계지 | ... ─── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    thead tr { border-bottom: 1px solid #F3F4F6; background: #F9FAFB; }
    th { padding: 11px 16px; font-size: 12px; font-weight: 600; color: #9CA3AF; text-align: left; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #F3F4F6; cursor: default; transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #FAFAFA; }
    td { padding: 13px 16px; font-size: 14px; color: #6B7280; vertical-align: middle; }
    td.region-name { font-weight: 500; color: #111827; }
    td.group-name { color: #6B7280; font-size: 13px; }
    td.order-name { color: #374151; font-size: 13px; font-weight: 500; }
    .action-cell { display: flex; align-items: center; gap: 6px; justify-content: center; }
    .truncate-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 72px 24px; gap: 10px; text-align: center;
    }
    .empty-icon { width: 48px; height: 48px; color: #D1D5DB; margin-bottom: 2px; }
    .empty-icon.error { color: #F87171; }
    .empty-title { font-size: 15px; font-weight: 600; color: #374151; }
    .empty-desc { font-size: 13px; color: #9CA3AF; line-height: 1.7; }

    /* ─── SKELETON ─── */
    .skeleton {
      background: linear-gradient(90deg, #F3F4F6 25%, #E9EAEC 50%, #F3F4F6 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ─── TOOLTIP ─── */
    .tip { position: relative; display: inline-flex; }
    .tipbox {
      position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      background: #1F2937; color: white; font-size: 11px; padding: 5px 10px; border-radius: 6px;
      white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 50;
    }
    .tip:hover .tipbox { opacity: 1; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .modal {
      background: white; border-radius: 16px; width: 480px; max-height: 88vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.18);
      animation: modalIn 0.2s ease;
    }
    .modal-sm { width: 380px; }
    @keyframes modalIn { from { opacity:0; transform: scale(0.96) translateY(8px); } to { opacity:1; transform: scale(1) translateY(0); } }
    .modal-header {
      padding: 20px 24px 16px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #E5E7EB; flex-shrink: 0;
    }
    .modal-title { font-size: 17px; font-weight: 700; color: #111827; }
    .modal-body { padding: 24px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
    .modal-footer {
      padding: 16px 24px; border-top: 1px solid #E5E7EB;
      display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0;
    }

    /* ─── FORM ─── */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label {
      font-size: 12px; font-weight: 500; color: #374151;
      display: flex; align-items: center; gap: 4px;
    }
    .form-label .req { color: #E60012; }
    .form-label .lock { color: #9CA3AF; }
    .input-field {
      width: 100%; height: 40px; padding: 0 12px;
      border: 1px solid #E5E7EB; border-radius: 8px; background: #F9FAFB;
      font-size: 14px; color: #111827; font-family: inherit; outline: none; transition: all 0.15s;
    }
    .input-field:focus { border-color: #9CA3AF; box-shadow: 0 0 0 1px #9CA3AF; }
    .input-field::placeholder { color: #9CA3AF; }
    .input-field[readonly] { color: #6B7280; cursor: default; }
    .input-field:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-hr { border: none; border-top: 1px solid #F3F4F6; margin: 2px 0; }
    .addr-row { display: flex; gap: 8px; align-items: flex-end; }
    .addr-row .form-group { flex: 1; }

    .modal-select {
      display: flex; align-items: center; justify-content: space-between;
      height: 40px; padding: 0 12px; border: 1px solid #E5E7EB; border-radius: 8px;
      background: #F9FAFB; font-size: 14px; color: #111827; cursor: pointer; width: 100%;
    }
    .modal-select.disabled { opacity: 0.5; cursor: not-allowed; background: #F3F4F6; }
    .modal-select.placeholder span { color: #9CA3AF; }

    /* ─── STATE SWITCHER ─── */
    .switcher {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px; background: rgba(17,24,39,0.92); backdrop-filter: blur(12px);
      padding: 6px; border-radius: 14px; z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .sw-btn {
      padding: 6px 14px; border-radius: 8px; font-size: 11.5px; font-weight: 600;
      color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.15s;
      border: none; background: transparent; font-family: inherit; white-space: nowrap; line-height: 1.5;
      text-align: center;
    }
    .sw-btn:hover { background: rgba(255,255,255,0.1); color: white; }
    .sw-btn.on { background: white; color: #111827; }
    .sw-sep { width: 1px; background: rgba(255,255,255,0.15); margin: 4px 2px; align-self: stretch; }

    /* ─── PAGINATION v1.9 ─── */
    .pagination-wrap {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-top: 1px solid #F3F4F6;
    }
    .pagination-range {
      font-size: 13px; color: #6B7280; white-space: nowrap;
    }
    .pagination-btns {
      display: flex; align-items: center; gap: 2px;
    }
    .pg-btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 32px; height: 32px; padding: 0 6px; border-radius: 6px;
      font-size: 13px; font-weight: 500; border: none; background: transparent;
      color: #374151; cursor: pointer; transition: background 0.12s;
    }
    .pg-btn:hover:not(:disabled) { background: #F3F4F6; }
    .pg-btn.active { background: #111827; color: white; font-weight: 700; }
    .pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .pg-btn svg { display: block; }

    /* ─── VERSION BADGE ─── */
    .ver-badge {
      position: fixed; top: 14px; right: 16px;
      background: #E60012; color: white; font-size: 11px; font-weight: 700;
      padding: 4px 10px; border-radius: 20px; z-index: 300; letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

<div class="ver-badge">UI Spec v1.9</div>

      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>

<!-- ═══ MAIN ═══ -->
<main class="main">
  <header class="header">
    <h1>연계지 관리</h1>
    <div class="header-search">
      <svg class="header-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="검색...">
    </div>
  </header>

  <div class="content">
    <!-- Page Header -->
    <div class="page-header">
      <h2>연계지 관리</h2>
      <!-- v1.4: 항상 활성 — disabled 없음 -->
      <button class="btn btn-primary btn-md" onclick="goModal('CREATE')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        연계지 등록
      </button>
    </div>

    <!-- Filters v1.7: SearchBox 왼쪽 → 선교 그룹 → 차수 (유저 관리 패턴 일치) -->
    <div class="filter-row">
      <!-- SearchBox 왼쪽 (유저 관리와 동일 패턴) -->
      <div class="filter-search-group">
        <span class="filter-label">&nbsp;</span>
        <div class="filter-search">
          <svg class="filter-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="이름, 목사명으로 검색..." oninput="handleSearch(this.value)" aria-label="연계지 검색" role="searchbox">
          <button class="filter-search-clear" id="searchClear" style="display:none" onclick="clearSearch()" title="검색어 초기화">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <!-- cascade 필터: 선교 그룹 → 차수 (오른쪽 그룹) -->
      <div class="filter-group">
        <span class="filter-label">선교 그룹</span>
        <div class="select-trigger has-value" id="groupSel" onclick="cycleGroup()">
          <span id="groupSelText">전체</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-label">차수</span>
        <div class="select-trigger has-value" id="missionSel" onclick="cycleMission()">
          <span id="missionSelText">전체</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
    </div>

    <!-- Dynamic Content -->
    <div id="area"></div>
  </div>
</main>

<!-- ═══ MODAL LAYER ═══ -->
<div class="modal-overlay" id="overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

<!-- ═══ STATE SWITCHER — v1.7: 선교 그룹 | 차수 | 연계지 컬럼 구조 ═══ -->

/* ─── FILTER STATE ───
   MissionGroup(선교 그룹) — 실제 선교 프로그램명 + category(국내/해외)
   Missionary(선교) — 차수 (1차, 2차)
─── */
let filterGroup = '전체';
let filterMission = '전체';
let searchQuery = '';

/* ─── PAGINATION STATE v1.9 ─── */
const PAGE_SIZE = 20;
let currentPage = 1;

const GROUP_OPTIONS = [
  { name:'전체', category: null },
  { name:'군선교',    category:'국내' },
  { name:'장흥선교',  category:'국내' },
  { name:'필리핀선교', category:'해외' },
];
const MISSION_MAP = {
  '전체':      ['전체'],
  '장흥선교':  ['전체', '1차', '2차'],
  '군선교':    ['전체', '1차'],
  '필리핀선교': ['전체', '1차'],
};

let groupIdx = 0;
let missionIdx = 0;

function cycleGroup() {
  groupIdx = (groupIdx + 1) % GROUP_OPTIONS.length;
  filterGroup = GROUP_OPTIONS[groupIdx].name;
  filterMission = '전체';
  missionIdx = 0;
  currentPage = 1; // 필터 변경 시 page 리셋
  const g = GROUP_OPTIONS[groupIdx];
  // Trigger 텍스트 — 카테고리 라벨 포함 (v1.5)
  document.getElementById('groupSelText').innerHTML =
    g.category
      ? `${g.name} <span style="font-size:11px;color:#9CA3AF;font-weight:400">(${g.category})</span>`
      : '전체';
  document.getElementById('missionSelText').textContent = '전체';
  refreshArea();
}

function cycleMission() {
  const opts = MISSION_MAP[filterGroup] || ['전체'];
  missionIdx = (missionIdx + 1) % opts.length;
  filterMission = opts[missionIdx];
  currentPage = 1; // 필터 변경 시 page 리셋
  document.getElementById('missionSelText').textContent = filterMission;
  refreshArea();
}

function handleSearch(val) {
  searchQuery = val;
  currentPage = 1; // 검색어 변경 시 page 리셋
  document.getElementById('searchClear').style.display = val ? 'flex' : 'none';
  refreshArea();
}

function clearSearch() {
  searchQuery = '';
  currentPage = 1;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  refreshArea();
}

function getFilteredRegions() {
  return REGIONS.filter(r => {
    const groupOk = filterGroup === '전체' || r.group === filterGroup;
    const missionOk = filterMission === '전체' || r.mission === filterMission;
    const queryOk = !searchQuery ||
      r.name.includes(searchQuery) ||
      (r.pastor !== '—' && r.pastor.includes(searchQuery));
    return groupOk && missionOk && queryOk;
  });
}

/* ─── PAGINATION RENDERER v1.9 ─── */
function renderPagination(total) {
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (totalPages <= 1) return ''; // 단일 페이지이면 미표시

  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end = Math.min(currentPage * PAGE_SIZE, total);

  // 페이지 그룹 (5개 단위)
  const GROUP = 5;
  const groupStart = Math.floor((currentPage - 1) / GROUP) * GROUP + 1;
  const groupEnd = Math.min(groupStart + GROUP - 1, totalPages);
  const pages = [];
  for (let i = groupStart; i <= groupEnd; i++) pages.push(i);

  const pgBtn = (label, page, disabled, active) =>
    `<button class="pg-btn${active ? ' active' : ''}" ${disabled ? 'disabled' : ''}
      onclick="goPage(${page})" aria-label="${label}" ${active ? 'aria-current="page"' : ''}>
      ${label}
    </button>`;

  const prevSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>`;
  const nextSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`;

  return `<div class="pagination-wrap">
    <span class="pagination-range">${start} - ${end} / 전체 ${total}건</span>
    <div class="pagination-btns">
      <button class="pg-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})" aria-label="이전 페이지">${prevSvg}</button>
      ${pages.map(p => pgBtn(p, p, false, p === currentPage)).join('')}
      <button class="pg-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})" aria-label="다음 페이지">${nextSvg}</button>
    </div>
  </div>`;
}

function goPage(page) {
  currentPage = page;
  refreshArea();
}

// v1.7: 테이블 — 선교 그룹 | 차수 | 연계지 | ...
// v1.6 3단계 정렬 유지: 선교 그룹명 ASC → 차수 DESC → 연계지 이름 ASC
function renderTable(regions) {
  const data = regions !== undefined ? regions : getFilteredRegions();
  const sorted = [...data].sort((a, b) => {
    const groupCmp = a.group.localeCompare(b.group, 'ko');
    if (groupCmp !== 0) return groupCmp;
    const aNum = parseInt(a.mission) || 0;
    const bNum = parseInt(b.mission) || 0;
    if (aNum !== bNum) return bNum - aNum;
    return a.name.localeCompare(b.name, 'ko');
  });

  // v1.9: 페이지네이션 — 20건/페이지 슬라이싱
  const total = sorted.length;
  const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
  if (currentPage > totalPages) currentPage = totalPages;
  const pageStart = (currentPage - 1) * PAGE_SIZE;
  const paged = sorted.slice(pageStart, pageStart + PAGE_SIZE);

  const rows = paged.map(r => `
    <tr>
      <td class="group-name">${r.group}</td>
      <td class="order-name">${r.mission}</td>
      <td class="region-name">${r.name}</td>
      <td>${r.purpose}</td>
      <td>${r.pastor}</td>
      <td>${r.phone}</td>
      <td>
        <div class="truncate-cell" title="${r.addr}${r.detail !== '—' ? ' ' + r.detail : ''}">${r.addr}${r.detail !== '—' ? ' ' + r.detail : ''}</div>
      </td>
      <td>
        <div class="action-cell">
          <div class="tip">
            <button class="btn btn-outline btn-xs" disabled style="cursor:not-allowed;opacity:.4">수정</button>
            <span class="tipbox">현재 사용 불가 (준비 중)</span>
          </div>
          <button class="btn btn-outline-danger btn-xs" onclick="goModal('DELETE')">삭제</button>
        </div>
      </td>
    </tr>`).join('');

  return `<div class="card">
    <div class="card-header">
      <div class="card-title">연계지 목록 <span class="count-badge">${total}개</span></div>
    </div>
    <div class="table-wrap">
      <table>
        <caption style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">연계지 목록</caption>
        <thead><tr>
          <th scope="col" style="width:140px">선교 그룹</th>
          <th scope="col" style="width:100px">차수</th>
          <th scope="col" style="width:140px">연계지</th>
          <th scope="col" style="width:120px">방문목적</th>
          <th scope="col" style="width:100px">목사명</th>
          <th scope="col" style="width:130px">목사연락처</th>
          <th scope="col">주소</th>
          <th scope="col" style="width:112px;text-align:center">액션</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${renderPagination(total)}
  </div>`;
}

/* ─── STATE MACHINE ─── */
const ALL_STATES = ['TABLE','B','C','LOAD','ERROR','CREATE','EDIT','DELETE'];
let curState = 'TABLE';
let forceState = null;

function refreshArea() {
  const area = document.getElementById('area');
  if (forceState === 'B')     { area.innerHTML = renderB();     return; }
  if (forceState === 'LOAD')  { area.innerHTML = renderLoad();  return; }
  if (forceState === 'ERROR') { area.innerHTML = renderError(); return; }

  const filtered = getFilteredRegions();
  if (searchQuery && filtered.length === 0) {
    area.innerHTML = renderC(searchQuery);
    setTabHighlight('C');
  } else if (filtered.length === 0) {
    area.innerHTML = renderB();
    setTabHighlight('B');
  } else {
    area.innerHTML = renderTable(filtered);
    setTabHighlight('TABLE');
  }
}

function goState(s) {
  curState = s;
  const area = document.getElementById('area');

  if (s === 'TABLE') {
    forceState = null;
    refreshArea();
  } else if (s === 'B') {
    forceState = 'B';
    area.innerHTML = renderB();
  } else if (s === 'C') {
    forceState = null;
    document.getElementById('searchInput').value = '삼일교회';
    searchQuery = '삼일교회';
    document.getElementById('searchClear').style.display = 'flex';
    area.innerHTML = renderC('삼일교회');
  } else if (s === 'LOAD') {
    forceState = 'LOAD';
    area.innerHTML = renderLoad();
  } else if (s === 'ERROR') {
    forceState = 'ERROR';
    area.innerHTML = renderError();
  }

  setTabHighlight(s);
  closeModal();
}

function setTabHighlight(s) {
  ALL_STATES.forEach(k => {
    const el = document.getElementById('sw-' + k);
    if (el) el.classList.toggle('on', k === s);
  });
}

function goModal(type) {
  const box = document.getElementById('modalBox');
  const overlay = document.getElementById('overlay');
  const map = { CREATE: renderCreateModal, EDIT: renderEditModal, DELETE: renderDeleteModal };
  box.innerHTML = (map[type] || renderCreateModal)();
  box.className = 'modal' + (type === 'DELETE' ? ' modal-sm' : '');
  overlay.style.display = 'flex';
  setTabHighlight(type);
}

function closeModal() {
  document.getElementById('overlay').style.display = 'none';
  setTabHighlight(curState);
}

// Init: 전체 기본 노출
goState('TABLE');
